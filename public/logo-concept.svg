<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main lens circle with gradient -->
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer lens ring -->
  <circle cx="85" cy="85" r="55" stroke="url(#lensGradient)" stroke-width="6" fill="none"/>
  
  <!-- Inner lens detail (glass refraction suggestion) -->
  <circle cx="85" cy="85" r="45" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Code bracket elements integrated into lens -->
  <!-- Left bracket -->
  <path d="M 65 70 L 55 70 L 55 100 L 65 100" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Right bracket -->
  <path d="M 105 70 L 115 70 L 115 100 L 105 100" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Center prompt cursor/line -->
  <rect x="82" y="80" width="6" height="20" fill="#3B82F6" rx="1"/>
  
  <!-- Magnifying glass handle -->
  <path d="M 125 125 L 155 155" stroke="url(#lensGradient)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Handle tip detail -->
  <circle cx="155" cy="155" r="4" fill="#8B5CF6"/>
</svg>