<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShowDontTell - Upload</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      padding: 0;
      margin: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
    }
    /* Nav */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      border-bottom: 1px solid #e2e8f0;
      background: white;
    }
    .logo {
      font-weight: 700;
      font-size: 20px;
      color: #3B82F6;
    }
    .nav-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .quota {
      font-size: 14px;
      color: #64748b;
      padding: 6px 12px;
      background: #f1f5f9;
      border-radius: 6px;
      font-weight: 500;
    }
    .avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border-radius: 50%;
    }
    /* Main content */
    .main {
      padding: 48px 32px;
      max-width: 900px;
      margin: 0 auto;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      color: #0f172a;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 48px;
      font-size: 16px;
    }
    /* Upload zone */
    .upload-zone {
      min-height: 400px;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: #f8fafc;
      margin-bottom: 32px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .upload-zone:hover {
      border-color: #3B82F6;
      background: #eff6ff;
    }
    .upload-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .upload-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #0f172a;
    }
    .upload-hint {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
    }
    .btn {
      padding: 12px 32px;
      border: none;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3B82F6;
      color: white;
    }
    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    /* Options */
    .options {
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: white;
      margin-bottom: 32px;
    }
    .options-title {
      font-weight: 600;
      margin-bottom: 20px;
      color: #0f172a;
      font-size: 16px;
    }
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .option-row:last-child {
      border-bottom: none;
    }
    .option-label {
      color: #334155;
      font-weight: 500;
    }
    .select {
      padding: 10px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      min-width: 200px;
      background: white;
      color: #0f172a;
      font-size: 14px;
      cursor: pointer;
    }
    .select:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 4px;
      cursor: pointer;
      appearance: none;
      background: white;
      position: relative;
    }
    .checkbox:checked {
      background: #3B82F6;
      border-color: #3B82F6;
    }
    .checkbox:checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 14px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    /* Action bar */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .btn-secondary {
      background: white;
      color: #64748b;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover {
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Nav -->
    <div class="nav">
      <div class="logo">ShowDontTell</div>
      <div class="nav-right">
        <span class="quota">Pro: 47 prompts left</span>
        <div class="avatar"></div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <h1 class="title">New Prompt</h1>
      <p class="subtitle">Upload your design screenshots and we'll extract the styles</p>

      <!-- Upload zone -->
      <div class="upload-zone">
        <div class="upload-icon">📸</div>
        <div class="upload-text">Drop your design screenshots here</div>
        <p class="upload-hint">PNG, JPEG, WEBP • Up to 3 images • 10MB max each</p>
        <button class="btn btn-primary">Browse Files</button>
      </div>

      <!-- Options -->
      <div class="options">
        <div class="options-title">Analysis Options</div>
        <div class="option-row">
          <label class="option-label">Export format</label>
          <select class="select">
            <option>Google Stitch</option>
            <option>Cursor</option>
            <option>Anima</option>
            <option>Generic (plain text)</option>
          </select>
        </div>
        <div class="option-row">
          <label class="option-label">Extract typography</label>
          <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="option-row">
          <label class="option-label">Extract spacing & layout</label>
          <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="option-row">
          <label class="option-label">Extract shadows & effects</label>
          <input type="checkbox" class="checkbox" checked>
        </div>
      </div>

      <!-- Action bar -->
      <div class="action-bar">
        <button class="btn btn-secondary">Cancel</button>
        <button class="btn btn-primary">Analyze Design</button>
      </div>
    </div>
  </div>
</body>
</html>
