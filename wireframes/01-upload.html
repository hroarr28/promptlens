<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShowDontTell - Upload Wireframe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border: 2px solid #333;
    }
    /* Nav */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 2px solid #333;
    }
    .logo {
      font-weight: bold;
      font-size: 18px;
    }
    .nav-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .avatar {
      width: 32px;
      height: 32px;
      background: #ddd;
      border: 2px solid #333;
      border-radius: 50%;
    }
    /* Main content */
    .main {
      padding: 48px 24px;
    }
    .title {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 12px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 48px;
    }
    /* Upload zone */
    .upload-zone {
      max-width: 800px;
      margin: 0 auto 32px;
      min-height: 400px;
      border: 3px dashed #333;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: #fafafa;
      position: relative;
    }
    .upload-icon {
      width: 80px;
      height: 80px;
      background: #e0e0e0;
      border: 2px solid #333;
      border-radius: 8px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .upload-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .upload-hint {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
    }
    .btn {
      padding: 12px 24px;
      border: 2px solid #333;
      background: white;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary {
      background: #333;
      color: white;
    }
    /* Options */
    .options {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #fafafa;
    }
    .options-title {
      font-weight: 600;
      margin-bottom: 16px;
    }
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #ddd;
    }
    .option-row:last-child {
      border-bottom: none;
    }
    .select {
      padding: 8px 12px;
      border: 2px solid #333;
      border-radius: 4px;
      min-width: 200px;
      background: white;
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #333;
    }
    /* Action bar */
    .action-bar {
      max-width: 800px;
      margin: 32px auto 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    /* Annotation */
    .annotation {
      position: absolute;
      font-size: 12px;
      color: #999;
      padding: 4px 8px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .annotation.top-right {
      top: 16px;
      right: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Nav -->
    <div class="nav">
      <div class="logo">ShowDontTell</div>
      <div class="nav-right">
        <span style="font-size: 14px; color: #666;">Pro: 47 prompts left</span>
        <div class="avatar"></div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <h1 class="title">New Prompt</h1>
      <p class="subtitle">Upload your design screenshots and we'll extract the styles</p>

      <!-- Upload zone -->
      <div class="upload-zone">
        <div class="annotation top-right">Drag & drop or click</div>
        <div class="upload-icon">📸</div>
        <div class="upload-text">Drop your design screenshots here</div>
        <p class="upload-hint">PNG, JPEG, WEBP • Up to 3 images • 10MB max each</p>
        <button class="btn btn-primary">Browse Files</button>
      </div>

      <!-- Options -->
      <div class="options">
        <div class="options-title">Analysis Options</div>
        <div class="option-row">
          <label>Export format</label>
          <select class="select">
            <option>Google Stitch</option>
            <option>Cursor</option>
            <option>Anima</option>
            <option>Generic (plain text)</option>
          </select>
        </div>
        <div class="option-row">
          <label>Extract typography</label>
          <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="option-row">
          <label>Extract spacing & layout</label>
          <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="option-row">
          <label>Extract shadows & effects</label>
          <input type="checkbox" class="checkbox" checked>
        </div>
      </div>

      <!-- Action bar -->
      <div class="action-bar">
        <button class="btn">Cancel</button>
        <button class="btn btn-primary">Analyze Design</button>
      </div>
    </div>
  </div>
</body>
</html>
